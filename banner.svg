<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020a02"/>
      <stop offset="50%" style="stop-color:#050f05"/>
      <stop offset="100%" style="stop-color:#020a02"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff41;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00ff41;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00ff41;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="textglow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#a0e0a0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="softblur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.07" stroke="#00ff41" stroke-width="0.5">
    <!-- Vertical lines -->
    <line x1="60" y1="0" x2="60" y2="300"/>
    <line x1="120" y1="0" x2="120" y2="300"/>
    <line x1="180" y1="0" x2="180" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="360" y1="0" x2="360" y2="300"/>
    <line x1="420" y1="0" x2="420" y2="300"/>
    <line x1="480" y1="0" x2="480" y2="300"/>
    <line x1="540" y1="0" x2="540" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="660" y1="0" x2="660" y2="300"/>
    <line x1="720" y1="0" x2="720" y2="300"/>
    <line x1="780" y1="0" x2="780" y2="300"/>
    <line x1="840" y1="0" x2="840" y2="300"/>
    <!-- Horizontal lines -->
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="250" x2="900" y2="250"/>
  </g>

  <!-- Circuit traces - left side -->
  <g stroke="#00ff41" stroke-width="1.5" fill="none" opacity="0.35">
    <polyline points="0,80 40,80 40,120 80,120"/>
    <polyline points="0,180 60,180 60,140 100,140"/>
    <polyline points="0,240 30,240 30,200 70,200 70,220 110,220"/>
    <polyline points="20,50 20,70 55,70 55,95 90,95"/>
    <polyline points="0,260 50,260 50,280 150,280"/>
  </g>

  <!-- Circuit traces - right side -->
  <g stroke="#00ff41" stroke-width="1.5" fill="none" opacity="0.35">
    <polyline points="900,80 860,80 860,120 820,120"/>
    <polyline points="900,180 840,180 840,140 800,140"/>
    <polyline points="900,240 870,240 870,200 830,200 830,220 790,220"/>
    <polyline points="880,50 880,70 845,70 845,95 810,95"/>
    <polyline points="900,260 850,260 850,280 750,280"/>
  </g>

  <!-- Node dots - left -->
  <g fill="#00ff41" opacity="0.6">
    <circle cx="40" cy="80" r="3"/>
    <circle cx="80" cy="120" r="2"/>
    <circle cx="60" cy="180" r="3"/>
    <circle cx="100" cy="140" r="2"/>
    <circle cx="30" cy="240" r="2"/>
    <circle cx="70" cy="200" r="3"/>
    <circle cx="110" cy="220" r="2"/>
    <circle cx="55" cy="70" r="2"/>
    <circle cx="90" cy="95" r="3"/>
  </g>

  <!-- Node dots - right -->
  <g fill="#00ff41" opacity="0.6">
    <circle cx="860" cy="80" r="3"/>
    <circle cx="820" cy="120" r="2"/>
    <circle cx="840" cy="180" r="3"/>
    <circle cx="800" cy="140" r="2"/>
    <circle cx="870" cy="240" r="2"/>
    <circle cx="830" cy="200" r="3"/>
    <circle cx="790" cy="220" r="2"/>
    <circle cx="845" cy="70" r="2"/>
    <circle cx="810" cy="95" r="3"/>
  </g>

  <!-- Glowing horizontal line top -->
  <rect x="0" y="2" width="900" height="1" fill="url(#glow)" opacity="0.8"/>

  <!-- Glowing horizontal line bottom -->
  <rect x="0" y="297" width="900" height="1" fill="url(#glow)" opacity="0.8"/>

  <!-- Center glow blob -->
  <ellipse cx="450" cy="150" rx="220" ry="100" fill="#00ff41" opacity="0.03" filter="url(#blur)"/>

  <!-- Corner brackets -->
  <g stroke="#00ff41" stroke-width="1.5" fill="none" opacity="0.5">
    <!-- Top left -->
    <polyline points="15,35 15,15 35,15"/>
    <!-- Top right -->
    <polyline points="865,15 885,15 885,35"/>
    <!-- Bottom left -->
    <polyline points="15,265 15,285 35,285"/>
    <!-- Bottom right -->
    <polyline points="865,285 885,285 885,265"/>
  </g>

  <!-- Top label -->
  <text x="450" y="72" font-family="'Courier New', monospace" font-size="11" fill="#00ff41" text-anchor="middle" opacity="0.7" letter-spacing="4">RTL DESIGN ENGINEER · FPGA · VLSI</text>

  <!-- Main name - shadow/glow layer -->
  <text x="452" y="148" font-family="'Courier New', monospace" font-size="56" font-weight="bold" fill="#00ff41" text-anchor="middle" opacity="0.15" filter="url(#blur)">KUMAR SAURAB</text>

  <!-- Main name -->
  <text x="450" y="148" font-family="'Courier New', monospace" font-size="56" font-weight="bold" fill="url(#textglow)" text-anchor="middle" letter-spacing="3">KUMAR SAURAB</text>

  <!-- Underline accent -->
  <rect x="200" y="158" width="500" height="1.5" fill="url(#glow)" opacity="0.9"/>

  <!-- Subtitle -->
  <text x="450" y="188" font-family="'Courier New', monospace" font-size="14" fill="#7acc7a" text-anchor="middle" letter-spacing="2">Verilog HDL  ·  Xilinx Vivado  ·  ModelSim  ·  Artix-7 FPGA</text>

  <!-- Stat boxes -->
  <!-- Box 1 -->
  <rect x="198" y="210" width="140" height="52" rx="2" fill="#00ff4108" stroke="#00ff41" stroke-width="0.8" opacity="0.9"/>
  <text x="268" y="230" font-family="'Courier New', monospace" font-size="10" fill="#00ff41" text-anchor="middle" opacity="0.7">MAX FREQUENCY</text>
  <text x="268" y="252" font-family="'Courier New', monospace" font-size="20" font-weight="bold" fill="#00ff41" text-anchor="middle">134 MHz</text>

  <!-- Box 2 -->
  <rect x="380" y="210" width="140" height="52" rx="2" fill="#00ff4108" stroke="#00ff41" stroke-width="0.8" opacity="0.9"/>
  <text x="450" y="230" font-family="'Courier New', monospace" font-size="10" fill="#00ff41" text-anchor="middle" opacity="0.7">SPEED IMPROVEMENT</text>
  <text x="450" y="252" font-family="'Courier New', monospace" font-size="20" font-weight="bold" fill="#00ff41" text-anchor="middle">+57%</text>

  <!-- Box 3 -->
  <rect x="562" y="210" width="140" height="52" rx="2" fill="#00ff4108" stroke="#00ff41" stroke-width="0.8" opacity="0.9"/>
  <text x="632" y="230" font-family="'Courier New', monospace" font-size="10" fill="#00ff41" text-anchor="middle" opacity="0.7">TEST VECTORS</text>
  <text x="632" y="252" font-family="'Courier New', monospace" font-size="20" font-weight="bold" fill="#00ff41" text-anchor="middle">1024 ✓</text>

  <!-- Bottom label -->
  <text x="450" y="288" font-family="'Courier New', monospace" font-size="10" fill="#00ff41" text-anchor="middle" opacity="0.45" letter-spacing="3">M.TECH MICROELECTRONICS &amp; VLSI · CGPA 8.44 · INDIA</text>

  <!-- Small pulsing dots decoration -->
  <circle cx="175" cy="150" r="3" fill="#00ff41" opacity="0.5"/>
  <circle cx="725" cy="150" r="3" fill="#00ff41" opacity="0.5"/>
  <circle cx="165" cy="150" r="6" fill="none" stroke="#00ff41" stroke-width="0.8" opacity="0.3"/>
  <circle cx="735" cy="150" r="6" fill="none" stroke="#00ff41" stroke-width="0.8" opacity="0.3"/>
</svg>
